syntax = "proto3";

package explorer.v1;

option go_package = "github.com/sovereign-l1/chain/api/explorer/v1;explorerv1";

import "google/api/annotations.proto";

service ExplorerService {
  rpc GetBlock(GetBlockRequest) returns (BlockDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/blocks/{height}"
    };
  }
  
  rpc ListBlocks(ListBlocksRequest) returns (BlockList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/blocks"
    };
  }

  rpc GetTx(GetTxRequest) returns (TxDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/txs/{hash}"
    };
  }

  rpc ListTxs(ListTxsRequest) returns (TxList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/txs"
    };
  }

  rpc ListTxsByAddress(ListTxsByAddressRequest) returns (TxList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/addresses/{address}/txs"
    };
  }

  rpc GetAddress(GetAddressRequest) returns (AccountDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/addresses/{address}"
    };
  }

  rpc GetValidator(GetValidatorRequest) returns (ValidatorDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/validators/{address}"
    };
  }

  rpc ListValidators(ListValidatorsRequest) returns (ValidatorSlotGrid) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/validators"
    };
  }

  rpc GetStakingStats(GetStakingStatsRequest) returns (StakingStats) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/staking/stats"
    };
  }

  rpc GetOracleFeed(GetOracleFeedRequest) returns (FeedDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/oracle/feeds/{feed_id}"
    };
  }

  rpc GetOracleRound(GetOracleRoundRequest) returns (RoundDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/oracle/feeds/{feed_id}/rounds/{round_id}"
    };
  }

  rpc ListOracleRounds(ListOracleRoundsRequest) returns (RoundList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/oracle/feeds/{feed_id}/rounds"
    };
  }

  rpc GetMilestone(GetMilestoneRequest) returns (MilestoneDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/milestones/{id}"
    };
  }

  rpc ListMilestones(ListMilestonesRequest) returns (MilestoneList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/milestones"
    };
  }

  rpc GetSettlement(GetSettlementRequest) returns (SettlementDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/settlements/{id}"
    };
  }

  rpc ListSettlements(ListSettlementsRequest) returns (SettlementList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/settlements"
    };
  }

  rpc GetContract(GetContractRequest) returns (ContractDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/contracts/{address}"
    };
  }

  rpc ListContracts(ListContractsRequest) returns (ContractList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/contracts"
    };
  }

  rpc GetCode(GetCodeRequest) returns (CodeDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/codes/{code_id}"
    };
  }

  rpc ListCodes(ListCodesRequest) returns (CodeList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/codes"
    };
  }

  rpc GetGovernanceProposal(GetProposalRequest) returns (ProposalDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/governance/proposals/{id}"
    };
  }

  rpc ListProposals(ListProposalsRequest) returns (ProposalList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/governance/proposals"
    };
  }

  rpc ListIbcChannels(ListIbcChannelsRequest) returns (IbcChannelList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/ibc/channels"
    };
  }

  rpc GetIbcChannel(GetIbcChannelRequest) returns (IbcChannelDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/ibc/channels/{channel_id}"
    };
  }

  rpc ListIbcAssets(ListIbcAssetsRequest) returns (IbcAssetList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/ibc/assets"
    };
  }

  rpc GetCw20Token(GetCw20TokenRequest) returns (Cw20TokenDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/tokens/cw20/{address}"
    };
  }

  rpc GetCw721Collection(GetCw721CollectionRequest) returns (Cw721CollectionDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/tokens/cw721/{address}"
    };
  }

  rpc GetCw721Token(GetCw721TokenRequest) returns (Cw721TokenDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/tokens/cw721/{address}/nft/{token_id}"
    };
  }

  rpc StreamLatestBlocks(StreamBlocksRequest) returns (stream BlockSummary);
  rpc StreamConsensusRound(StreamConsensusRequest) returns (stream ConsensusRound);

  rpc GetBridgeTx(GetBridgeTxRequest) returns (BridgeTxDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/bridge/txs/{nonce}"
    };
  }

  rpc ListBridgeTxs(ListBridgeTxsRequest) returns (BridgeTxList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/bridge/txs"
    };
  }

  rpc GetBridgeSupplyMetrics(GetBridgeSupplyMetricsRequest) returns (SupplyMetrics) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/bridge/supply"
    };
  }

  rpc ListRelayers(ListRelayersRequest) returns (RelayerList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/bridge/relayers"
    };
  }

  rpc ListBridgeCircuitBreaker(ListBridgeCircuitBreakerRequest) returns (CircuitBreakerHistory) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/bridge/circuit-breaker"
    };
  }

  rpc ListBridgeNonces(ListBridgeNoncesRequest) returns (NonceRegistryDetail) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/bridge/nonces"
    };
  }

  rpc GetTpsHistory(GetTpsRequest) returns (TpsHistory) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/analytics/tps"
    };
  }

  rpc GetBlockTimeHistory(GetBlockTimeRequest) returns (BlockTimeHistory) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/analytics/block-time"
    };
  }

  rpc GetValidatorUptimeGrid(GetUptimeRequest) returns (UptimeHeatmap) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/analytics/validator-uptime"
    };
  }

  rpc GetBridgeVolumeHistory(GetBridgeVolumeRequest) returns (VolumeHistory) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/analytics/bridge-volume"
    };
  }
  rpc ExportTxsCsv(ExportTxsCsvRequest) returns (stream CsvChunk) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/addresses/{address}/export"
    };
  }

  rpc SearchGlobal(SearchRequest) returns (SearchResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/search"
    };
  }

  rpc RegisterWebhook(RegisterWebhookRequest) returns (WebhookDetail) {
    option (google.api.http) = {
      post: "/api/rest/v1/explorer/webhooks"
      body: "*"
    };
  }

  rpc ListWebhooks(ListWebhooksRequest) returns (WebhookList) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/webhooks"
    };
  }

  rpc DeleteWebhook(DeleteWebhookRequest) returns (DeleteWebhookResponse) {
    option (google.api.http) = {
      delete: "/api/rest/v1/explorer/webhooks/{id}"
    };
  }

  rpc GetSystemStatus(GetSystemStatusRequest) returns (SystemStatus) {
    option (google.api.http) = {
      get: "/api/rest/v1/explorer/status"
    };
  }
}

message PageRequest {
  string cursor = 1;
  uint32 limit = 2;
}

message PageResponse {
  string next_cursor = 1;
  bool has_more = 2;
}

message GetBlockRequest {
  int64 height = 1;
}

message BlockDetail {
  int64 height = 1;
  string time = 2;
  string proposer = 3;
  int32 tx_count = 4;
  int64 gas_used = 5;
  int64 gas_limit = 6;
  string app_hash = 7;
}

message ListBlocksRequest {
  PageRequest pagination = 1;
}

message BlockList {
  repeated BlockDetail blocks = 1;
  PageResponse pagination = 2;
}

message GetTxRequest {
  string hash = 1;
}

message TxDetail {
  string hash = 1;
  int64 height = 2;
  string time = 3;
  string type = 4;
  repeated string msg_types = 5;
  string decoded = 6; // JSON string
  int64 fee = 7;
  int64 gas_used = 8;
  int32 status = 9;
}

message ListTxsRequest {
  PageRequest pagination = 1;
  string type = 2; // e.g. "cosmos", "evm", "cosmwasm", etc.
  int64 height = 3;
}

message TxList {
  repeated TxDetail txs = 1;
  PageResponse pagination = 2;
}

message ListTxsByAddressRequest {
  string address = 1;
  PageRequest pagination = 2;
}

message GetAddressRequest {
  string address = 1;
}

message AccountDetail {
  string address_bech32 = 1;
  string address_hex = 2;
  int64 first_seen = 3;
  int64 last_active = 4;
  string balance = 5;
}

message StreamBlocksRequest {}

message BlockSummary {
  int64 height = 1;
  string hash = 2;
  int32 tx_count = 3;
  string time = 4;
}

message StreamConsensusRequest {}

message ConsensusRound {
  int64 height = 1;
  int32 round = 2;
  string step = 3;
  string proposer = 4;
  repeated ValidatorVote votes = 5;
}

message ValidatorVote {
  string validator = 1;
  bool voted = 2;
  int64 power = 3;
}

message GetValidatorRequest {
  string address = 1;
}

message ValidatorDetail {
  string address = 1;
  int32 slot_index = 2;
  int64 power = 3;
  string status = 4;
  int64 missed_blocks = 5;
  int32 certification_score = 6;
}

message ListValidatorsRequest {
  PageRequest pagination = 1;
}

message ValidatorSlotGrid {
  repeated ValidatorDetail validators = 1;
  PageResponse pagination = 2;
}

message GetStakingStatsRequest {}

message StakingStats {
  string total_bonded = 1;
  string bonded_ratio = 2;
  string inflation = 3;
  string community_pool = 4;
  string apr = 5;
}

message GetOracleFeedRequest {
  string feed_id = 1;
}

message FeedDetail {
  string feed_id = 1;
  string title = 2;
  string latest_price = 3;
  string status = 4; // fresh / stale / stale-blocked
  string last_updated = 5;
}

message GetOracleRoundRequest {
  string feed_id = 1;
  int64 round_id = 2;
}

message RoundDetail {
  int64 round_id = 1;
  string feed_id = 2;
  int64 height = 3;
  string time = 4;
  string aggregated_median = 5;
  string status = 6;
  repeated OracleCommit commits = 7;
  repeated OracleReveal reveals = 8;
}

message OracleCommit {
  string validator = 1;
  string hash = 2;
  string time = 3;
}

message OracleReveal {
  string validator = 1;
  string value = 2;
  string time = 3;
}

message ListOracleRoundsRequest {
  string feed_id = 1;
  PageRequest pagination = 2;
}

message RoundList {
  repeated RoundDetail rounds = 1;
  PageResponse pagination = 2;
}

message GetMilestoneRequest {
  int64 id = 1;
}

message MilestoneDetail {
  int64 id = 1;
  string creator = 2;
  string status = 3;
  string title = 4;
  string target_price = 5;
  string feed_id = 6;
  int64 achieved_height = 7;
  int64 expired_height = 8;
  int64 total_paused_duration = 9;
  repeated MilestoneEvent events = 10;
}

message MilestoneEvent {
  int64 id = 1;
  int64 milestone_id = 2;
  int64 height = 3;
  string event_type = 4;
  string value = 5;
  string time = 6;
}

message ListMilestonesRequest {
  PageRequest pagination = 1;
}

message MilestoneList {
  repeated MilestoneDetail milestones = 1;
  PageResponse pagination = 2;
}

message GetSettlementRequest {
  int64 id = 1;
}

message SettlementDetail {
  int64 id = 1;
  string witness = 2;
  string status = 3;
  string chain_id = 4;
  string tx_hash = 5;
  int64 height = 6;
  string time = 7;
  string witness_signatures = 8; // JSON string
}

message ListSettlementsRequest {
  PageRequest pagination = 1;
}

message SettlementList {
  repeated SettlementDetail settlements = 1;
  PageResponse pagination = 2;
}

message GetContractRequest {
  string address = 1;
}

message ContractDetail {
  string address = 2;
  int64 code_id = 3;
  string label = 4;
  string creator = 5;
  string admin = 6;
  string type_badge = 7; // e.g. "CW-20", "CW-721", etc.
  string execute_history = 8; // JSON string
}

message ListContractsRequest {
  PageRequest pagination = 1;
}

message ContractList {
  repeated ContractDetail contracts = 1;
  PageResponse pagination = 2;
}

message GetCodeRequest {
  int64 code_id = 1;
}

message CodeDetail {
  int64 code_id = 1;
  string uploader = 2;
  int64 height = 3;
  string checksum = 4;
  int32 instantiation_count = 5;
  string tx_hash = 6;
}

message ListCodesRequest {
  PageRequest pagination = 1;
}

message CodeList {
  repeated CodeDetail codes = 1;
  PageResponse pagination = 2;
}

message GetProposalRequest {
  int64 id = 1;
}

message ProposalDetail {
  int64 id = 1;
  string status = 2;
  string title = 3;
  string type_badge = 4;
  string description = 5;
  string submit_time = 6;
  string deposit_end_time = 7;
  string voting_start_time = 8;
  string voting_end_time = 9;
  string tally_result = 10; // JSON string
  bool constitution_check_passed = 11;
}

message ListProposalsRequest {
  PageRequest pagination = 1;
}

message ProposalList {
  repeated ProposalDetail proposals = 1;
  PageResponse pagination = 2;
}

message ListIbcChannelsRequest {}

message IbcChannelDetail {
  string channel_id = 1;
  string port_id = 2;
  string counterparty_channel_id = 3;
  string counterparty_port_id = 4;
  string state = 5;
  string ordering = 6;
  int64 packet_count = 7;
}

message IbcChannelList {
  repeated IbcChannelDetail channels = 1;
}

message ListIbcAssetsRequest {}

message IbcAsset {
  string denom = 1;
  string origin_chain = 2;
  string path = 3;
  string amount = 4;
  string trace_hash = 5;
}

message IbcAssetList {
  repeated IbcAsset assets = 1;
}

message GetCw20TokenRequest {
  string address = 1;
}

message Cw20TokenDetail {
  string address = 1;
  string name = 2;
  string symbol = 3;
  int32 decimals = 4;
  string total_supply = 5;
  string balance = 6;
  repeated Cw20Transfer transfers = 7;
  repeated Cw20Holder holders = 8;
}

message Cw20Transfer {
  string from = 1;
  string to = 2;
  string amount = 3;
  string tx_hash = 4;
  string time = 5;
}

message Cw20Holder {
  string address = 1;
  string balance = 2;
}

message GetCw721CollectionRequest {
  string address = 1;
}

message Cw721CollectionDetail {
  string address = 1;
  string name = 2;
  string symbol = 3;
  int64 total_tokens = 4;
  repeated Cw721TokenSummary tokens = 5;
}

message Cw721TokenSummary {
  string token_id = 1;
  string owner = 2;
  string image = 3;
}

message GetCw721TokenRequest {
  string address = 1;
  string token_id = 2;
}

message Cw721TokenDetail {
  string address = 1;
  string token_id = 2;
  string owner = 3;
  string image = 4;
  string metadata_uri = 5;
  string metadata_json = 6;
  repeated Cw721Transfer transfers = 7;
}

message Cw721Transfer {
  string from = 1;
  string to = 2;
  string tx_hash = 3;
  string time = 4;
}

message GetIbcChannelRequest {
  string channel_id = 1;
}

message GetBridgeTxRequest {
  int64 nonce = 1;
}

message BridgeTxDetail {
  int64 id = 1;
  string direction = 2;
  int64 nonce = 3;
  string status = 4;
  string source_hash = 5;
  string dest_hash = 6;
  string amount = 7;
  string sender = 8;
  string receiver = 9;
  int64 height = 10;
  string time = 11;
}

message ListBridgeTxsRequest {
  PageRequest pagination = 1;
}

message BridgeTxList {
  repeated BridgeTxDetail txs = 1;
  PageResponse pagination = 2;
}

message GetBridgeSupplyMetricsRequest {}

message SupplyMetrics {
  string cosmos_minted = 1;
  string bsc_circulating = 2;
  string total_supply = 3;
  string bridge_supply_gauge = 4;
}

message ListRelayersRequest {}

message RelayerDetail {
  string address = 1;
  string status = 2;
  int64 last_active = 3;
  int32 miss_count = 4;
}

message RelayerList {
  repeated RelayerDetail relayers = 1;
}

message ListBridgeCircuitBreakerRequest {}

message CircuitBreakerHistory {
  repeated CircuitBreakerEvent events = 1;
}

message CircuitBreakerEvent {
  int64 height = 1;
  string event_type = 2;
  string trigger_address = 3;
  string time = 4;
}

message ListBridgeNoncesRequest {}

message NonceRegistryDetail {
  repeated int64 used_nonces = 1;
  repeated int64 in_flight_nonces = 2;
}

message GetTpsRequest {}

message TpsHistory {
  repeated TpsPoint points = 1;
}

message TpsPoint {
  string time = 1;
  float tps = 2;
}

message GetBlockTimeRequest {}

message BlockTimeHistory {
  repeated BlockTimePoint points = 1;
}

message BlockTimePoint {
  string time = 1;
  float duration = 2;
}

message GetUptimeRequest {}

message UptimeHeatmap {
  repeated UptimePoint points = 1;
}

message UptimePoint {
  int32 slot_index = 1;
  string time = 2;
  float uptime = 3;
}

message GetBridgeVolumeRequest {}

message VolumeHistory {
  repeated VolumePoint points = 1;
}

message VolumePoint {
  string time = 1;
  string volume = 2;
}

message ExportTxsCsvRequest {
  string address = 1;
}

message CsvChunk {
  bytes data = 1;
}

message SearchRequest {
  string query = 1;
}

message SearchResultItem {
  string type = 1;
  string id = 2;
  string label = 3;
}

message SearchResponse {
  repeated SearchResultItem results = 1;
}

message RegisterWebhookRequest {
  string url = 1;
  string address = 2;
  repeated string events = 3;
}

message WebhookDetail {
  int64 id = 1;
  string url = 2;
  string address = 3;
  string secret = 4;
  repeated string events = 5;
  string created_at = 6;
}

message ListWebhooksRequest {}

message WebhookList {
  repeated WebhookDetail webhooks = 1;
}

message DeleteWebhookRequest {
  int64 id = 1;
}

message DeleteWebhookResponse {
  bool success = 1;
}

message GetSystemStatusRequest {}

message SystemStatus {
  int64 indexer_height = 1;
  int64 blockscout_height = 2;
  string nats_status = 3;
  string api_p95_latency = 4;
  string time = 5;
}

syntax = "proto3";

package backend.v1;

option go_package = "github.com/sovereign-l1/chain/api/backend/v1;backendv1";

import "google/api/annotations.proto";

service QueryService {
  rpc GetBridgeVolume(GetBridgeVolumeRequest) returns (GetBridgeVolumeResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/bridge/volume"
    };
  }

  rpc GetValidatorUptime(GetValidatorUptimeRequest) returns (GetValidatorUptimeResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/validator/uptime/{validator_address}"
    };
  }

  rpc GetOracleParticipation(GetOracleParticipationRequest) returns (GetOracleParticipationResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/oracle/participation/{oracle_address}"
    };
  }

  rpc GetSettlement(GetSettlementRequest) returns (GetSettlementResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/settlement/{settlement_id}"
    };
  }

  rpc GetMilestoneStatus(GetMilestoneStatusRequest) returns (GetMilestoneStatusResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/milestone/{milestone_id}"
    };
  }

  rpc GetBridgePending(GetBridgePendingRequest) returns (GetBridgePendingResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/bridge/pending/{nonce}"
    };
  }

  rpc GetTps(GetTpsRequest) returns (GetTpsResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/analytics/tps"
    };
  }

  rpc GetBlockStats(GetBlockStatsRequest) returns (GetBlockStatsResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/analytics/blocks"
    };
  }

  rpc GetOraclePrice(GetOraclePriceRequest) returns (GetOraclePriceResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/analytics/oracle/price"
    };
  }

  rpc ListSettlements(ListSettlementsRequest) returns (ListSettlementsResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/settlements"
    };
  }

  rpc ListMilestones(ListMilestonesRequest) returns (ListMilestonesResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/milestones"
    };
  }

  rpc GetBridgeTx(GetBridgeTxRequest) returns (GetBridgeTxResponse) {
    option (google.api.http) = {
      get: "/api/rest/v1/bridge/tx/{tx_hash}"
    };
  }
}

message PageRequest {
  bytes cursor = 1;
  uint32 limit = 2;
}

message PageResponse {
  bytes next_cursor = 1;
  bool has_more = 2;
}

message ListSettlementsRequest {
  PageRequest pagination = 1;
}

message ListSettlementsResponse {
  repeated GetSettlementResponse settlements = 1;
  PageResponse pagination = 2;
}

message ListMilestonesRequest {
  PageRequest pagination = 1;
}

message ListMilestonesResponse {
  repeated GetMilestoneStatusResponse milestones = 1;
  PageResponse pagination = 2;
}

message GetBridgeTxRequest {
  string tx_hash = 1;
}

message GetBridgeTxResponse {
  string tx_hash = 1;
  string status = 2;
  int64 block_height = 3;
  string token_address = 4;
  string amount = 5;
  string sender = 6;
  string recipient = 7;
}

message GetBridgeVolumeRequest {
  string token_address = 1;
  string chain_id = 2;
  string timeframe = 3; // e.g., "daily", "hourly"
}

message GetBridgeVolumeResponse {
  string total_minted = 1;
  string total_burned = 2;
  string volume_usd = 3;
  int64 transaction_count = 4;
}

message GetValidatorUptimeRequest {
  string validator_address = 1;
}

message GetValidatorUptimeResponse {
  string validator_address = 1;
  int64 total_blocks = 2;
  int64 missed_blocks = 3;
  double uptime_percentage = 4;
}

message GetOracleParticipationRequest {
  string oracle_address = 1;
}

message GetOracleParticipationResponse {
  string oracle_address = 1;
  int64 total_requests = 2;
  int64 successful_reveals = 3;
  double participation_rate = 4;
}

message GetSettlementRequest {
  string settlement_id = 1;
}

message GetSettlementResponse {
  string settlement_id = 1;
  bytes proof = 2;
  string status = 3;
  int64 block_height = 4;
  repeated string signatures = 5;
}

message GetMilestoneStatusRequest {
  string milestone_id = 1;
}

message GetMilestoneStatusResponse {
  string milestone_id = 1;
  string status = 2;
  int64 block_height = 3;
}

message GetBridgePendingRequest {
  uint64 nonce = 1;
}

message GetBridgePendingResponse {
  uint64 nonce = 1;
  string token_address = 2;
  string amount = 3;
  string recipient = 4;
  string status = 5;
}

message GetTpsRequest {}

message GetTpsResponse {
  double tps_avg = 1;
  double tps_peak = 2;
  int64 total_txs = 3;
}

message GetBlockStatsRequest {}

message GetBlockStatsResponse {
  double avg_ms = 1;
  int64 max_ms = 2;
}

message GetOraclePriceRequest {
  string asset_id = 1;
}

message GetOraclePriceResponse {
  string asset_id = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  int64 submission_count = 6;
}

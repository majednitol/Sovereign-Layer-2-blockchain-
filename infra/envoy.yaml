static_resources:
  listeners:
    - name: api_gateway_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                codec_type: AUTO
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: api_service
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/api/rest/cosmos/"
                          route:
                            cluster: chain_rest
                            prefix_rewrite: "/cosmos/"
                        - match:
                            prefix: "/api/rest/"
                          route:
                            cluster: backend_grpc_gateway
                        - match:
                            prefix: "/api/grpcweb/"
                          route:
                            cluster: backend_grpc
                            prefix_rewrite: "/"
                            max_stream_duration:
                              grpc_timeout_header_max: 0s
                        - match:
                            prefix: "/evm-rpc"
                          route:
                            cluster: chain_evm_rpc
                        - match:
                            prefix: "/evm-ws"
                          route:
                            cluster: chain_evm_ws
                            upgrade_configs:
                              - upgrade_type: websocket
                        - match:
                            prefix: "/grpc/"
                          route:
                            cluster: chain_grpc
                        - match:
                            prefix: "/rpc"
                          route:
                            cluster: chain_rpc
                        # --- Explorer Routes ---
                        - match:
                            prefix: "/explorer"
                          route:
                            cluster: explorer_frontend
                        - match:
                            prefix: "/faucet"
                          route:
                            cluster: faucet_service
                      cors:
                        allow_origin_string_match:
                          - exact: "https://app.example.com"
                          - exact: "http://localhost:3000"
                        allow_methods: "GET, POST, OPTIONS"
                        allow_headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Grpc-Web,X-User-Agent,x-wallet-address"
                        expose_headers: "Content-Length,Content-Range,Grpc-Status,Grpc-Message,Grpc-Status-Details-Bin"
                        max_age: "1728000"
                http_filters:
                  - name: envoy.filters.http.cors
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                  - name: envoy.filters.http.grpc_web
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWeb
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: http_local_rate_limiter
                      token_bucket:
                        max_tokens: 100
                        tokens_per_fill: 10
                        fill_interval: 1s
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      descriptors:
                        - entries:
                            - key: client_header
                              value: relayer
                          token_bucket:
                            max_tokens: 100000
                            tokens_per_fill: 100000
                            fill_interval: 1s
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: backend_grpc_gateway
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: backend_grpc_gateway
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend-api
                      port_value: 8081

    - name: backend_grpc
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      http2_protocol_options: {}
      load_assignment:
        cluster_name: backend_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend-api
                      port_value: 9090

    - name: chain_evm_rpc
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: chain_evm_rpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: chain-node
                      port_value: 8545

    - name: chain_evm_ws
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: chain_evm_ws
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: chain-node
                      port_value: 8546

    - name: chain_grpc
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      http2_protocol_options: {}
      load_assignment:
        cluster_name: chain_grpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: chain-node
                      port_value: 9090

    - name: chain_rpc
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: chain_rpc
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: chain-node
                      port_value: 26657

    # --- Explorer Clusters ---
    - name: explorer_frontend
      connect_timeout: 0.5s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: explorer_frontend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                     socket_address:
                       address: explorer-frontend
                       port_value: 3000

    - name: faucet_service
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: faucet_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: faucet-service
                      port_value: 8000

    - name: chain_rest
      connect_timeout: 0.25s
      type: LOGICAL_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: chain_rest
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: chain-node
                      port_value: 1317

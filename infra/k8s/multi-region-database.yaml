apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescale-db
  namespace: sovereign-mainnet
  labels:
    app: timescale-db
spec:
  serviceName: timescale-db-service
  replicas: 2
  selector:
    matchLabels:
      app: timescale-db
  template:
    metadata:
      labels:
        app: timescale-db
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - timescale-db
                topologyKey: topology.kubernetes.io/region
      containers:
        - name: timescale-db
          image: timescale/timescaledb-ha:pg16-ts2.14-latest
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: PATRONI_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PATRONI_KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: PATRONI_KUBERNETES_USE_ENDPOINTS
              value: "true"
            - name: PATRONI_SCOPE
              value: "timescale-db-cluster"
            - name: PATRONI_BOOTSTRAP_DCS
              value: |
                postgresql:
                  use_pg_rewind: true
                  use_slots: true
                  parameters:
                    shared_buffers: 4GB
                    max_connections: 200
                    synchronous_commit: "on"
                    synchronous_standby_names: "FIRST 1 (*)"
                    archive_mode: "on"
                    archive_command: "pg_dump -U postgres > /var/lib/postgresql/data/backup.sql"
            - name: PATRONI_SUPERUSER_USERNAME
              value: "postgres"
            - name: PATRONI_SUPERUSER_PASSWORD
              value: "sovereign_admin_pwd"
            - name: PATRONI_REPLICATION_USERNAME
              value: "replicator"
            - name: PATRONI_REPLICATION_PASSWORD
              value: "sovereign_repl_pwd"
          resources:
            requests:
              memory: "8Gi"
              cpu: "4000m"
            limits:
              memory: "16Gi"
              cpu: "8000m"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 200Gi
---
apiVersion: v1
kind: Service
metadata:
  name: timescale-db-write
  namespace: sovereign-mainnet
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: timescale-db
    role: master
---
apiVersion: v1
kind: Service
metadata:
  name: timescale-db-read
  namespace: sovereign-mainnet
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: timescale-db

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: wireguard-tunnel
  namespace: sovereign-mainnet
  labels:
    app: wireguard-tunnel
spec:
  selector:
    matchLabels:
      app: wireguard-tunnel
  template:
    metadata:
      labels:
        app: wireguard-tunnel
    spec:
      hostNetwork: true
      containers:
        - name: wireguard
          image: linuxserver/wireguard:latest
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
            privileged: true
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "UTC"
            - name: SERVERPORT
              value: "51820"
            - name: PEERS
              value: "region-b-peer"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: modules
              mountPath: /lib/modules
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: wireguard-config
        - name: modules
          hostPath:
            path: /lib/modules
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wireguard-config
  namespace: sovereign-mainnet
data:
  wg0.conf: |
    [Interface]
    Address = 10.0.0.1/24
    ListenPort = 51820
    PrivateKey = PRIVATE_KEY_PLACEHOLDER

    [Peer]
    PublicKey = PEER_PUBLIC_KEY_PLACEHOLDER
    Endpoint = region-b.sovereign.l1:51820
    AllowedIPs = 10.0.0.2/32
    PersistentKeepalive = 25
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: db-cross-region-replication-policy
  namespace: sovereign-mainnet
spec:
  podSelector:
    matchLabels:
      app: timescale-db
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/24 # Secure WireGuard tunnel IP block
      ports:
        - protocol: TCP
          port: 5432 # Postgres replication port
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/24 # Secure replication outbound destination
      ports:
        - protocol: TCP
          port: 5432

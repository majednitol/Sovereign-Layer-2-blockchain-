apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: validator-isolation-policy
  namespace: sovereign-chain
spec:
  podSelector:
    matchLabels:
      role: validator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress only from Sentry nodes
    - from:
        - podSelector:
            matchLabels:
              role: sentry
      ports:
        - protocol: TCP
          port: 26656
  egress:
    # Allow egress only to Sentry nodes and Horcrux cosigners
    - to:
        - podSelector:
            matchLabels:
              role: sentry
      ports:
        - protocol: TCP
          port: 26656
    - to:
        - podSelector:
            matchLabels:
              role: horcrux-signer
      ports:
        - protocol: TCP
          port: 2222
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sentry-policy
  namespace: sovereign-chain
spec:
  podSelector:
    matchLabels:
      role: sentry
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow public / dApp / RPC fleet ingress
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              role: rpc-node
      ports:
        - protocol: TCP
          port: 26656
  egress:
    # Allow egress to validators and public RPCs
    - to:
        - podSelector:
            matchLabels:
              role: validator
      ports:
        - protocol: TCP
          port: 26656
    - to:
        - podSelector:
            matchLabels:
              role: sentry
      ports:
        - protocol: TCP
          port: 26656
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-isolation-policy
  namespace: sovereign-backend
spec:
  podSelector:
    matchLabels:
      role: database
  policyTypes:
    - Ingress
  ingress:
    # Allow database ingress ONLY from backend-api services (ingestion, projection, api)
    - from:
        - podSelector:
            matchLabels:
              app: backend-api
      ports:
        - protocol: TCP
          port: 5432

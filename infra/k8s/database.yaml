apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database-write
  namespace: sovereign-chain
spec:
  serviceName: database-write-service
  replicas: 1
  selector:
    matchLabels:
      role: database-write
  template:
    metadata:
      labels:
        role: database-write
    spec:
      containers:
        - name: postgres
          image: timescale/timescaledb-ha:pg16-ts2.14-latest
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: sovereign_write
            - name: POSTGRES_PASSWORD
              value: sovereign_write_pwd
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: data-volume
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data-volume
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: timescale-db-write
  namespace: sovereign-chain
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    role: database-write
---

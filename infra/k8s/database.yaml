apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database-relayer
  namespace: sovereign-chain
spec:
  serviceName: database-relayer-service
  replicas: 1
  selector:
    matchLabels:
      role: database-relayer
  template:
    metadata:
      labels:
        role: database-relayer
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: sovereign_relayer
            - name: POSTGRES_PASSWORD
              value: sovereign_relayer_pwd
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: data-volume
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data-volume
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-relayer
  namespace: sovereign-chain
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    role: database-relayer

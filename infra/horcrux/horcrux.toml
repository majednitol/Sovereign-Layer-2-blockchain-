# Horcrux Configuration Template (2-of-3 threshold signer configuration)
#
# ⚠️ SECURITY WARNING: The validator private key must be split using Shamir's Secret
# Sharing (SSS) into 3 distinct key shards (share-1.key, share-2.key, share-3.key)
# and distributed securely to each cosigner node. NEVER reuse or copy the same
# test key across nodes, and never use pre-configured test keys on mainnet.
#
# Threshold settings
threshold = 2

# Cosigner node configuration
[cosigner]
node-id = 1
listen-addr = "0.0.0.0:2222"

# Definition of the three cosigners forming the cluster
peers = [
    { id = 1, address = "horcrux-0.sovereign-chain.svc:2222" },
    { id = 2, address = "horcrux-1.sovereign-chain.svc:2222" },
    { id = 3, address = "horcrux-2.sovereign-chain.svc:2222" }
]

# Chains to sign for
[chain]
chain-id = "sovereign-1"
key-file = "/secrets/share.key"
state-file = "/data/state.json"
double-sign-protection = true
timeout-ms = 1000

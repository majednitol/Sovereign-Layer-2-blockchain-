# Default values for sovereign-chain.
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: sovereign-l1/chain-node
  pullPolicy: IfNotPresent
  tag: "latest"

namespace: sovereign-chain

validator:
  replicas: 1
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

backend:
  ingestion:
    replicas: 1
  projection:
    replicas: 2
  api:
    replicas: 3
  imageRegistry: sovereign-l1

nats:
  replicas: 3
  storageSize: 10Gi

database:
  storageSize: 100Gi
  writePassword: "sovereign_write_pwd"
  readPassword: "sovereign_read_pwd"

grpcGateway:
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 80

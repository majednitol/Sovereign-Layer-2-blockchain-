# NATS Server Config with NKey User Permissions

authorization {
  users = [
    # Ingestion Client Role
    {
      nkey = "UAZ4E4X46A53H4OG3E3UX64KQNGP76BNUQDCF7M5QE7S3KOY4FNJ6IIY"
      permissions = {
        publish = ["account:chain", "$JS.API.>", "$JS.ACK.>"]
        subscribe = ["_INBOX.>"]
      }
    },
    # Projection Client Role
    {
      nkey = "UCGECJAIMADYMTTLDMYMA57GLT2ZCLGR3UIVHCLTCCLF3NJAXCK4ICBT"
      permissions = {
        publish = ["account:stream", "$JS.API.>", "$JS.ACK.>"]
        subscribe = ["account:chain", "_INBOX.>"]
      }
    },
    # Stream / API Client Role
    {
      nkey = "UCU5E5BS7VT7RMJMXJM7VYSTYN6UCUOABE6XGUUA73OHU5MMB5WFG4QS"
      permissions = {
        publish = ["$JS.API.>", "$JS.ACK.>"]
        subscribe = ["account:stream", "_INBOX.>"]
      }
    },
    # Explorer services (unauthenticated / no NKey)
    {
      user = "explorer"
      password = "explorer_pass"
      permissions = {
        publish = ["explorer.>", "$JS.API.>", "$JS.ACK.>"]
        subscribe = ["explorer.>", "account:>", "_INBOX.>"]
      }
    }
  ]
}

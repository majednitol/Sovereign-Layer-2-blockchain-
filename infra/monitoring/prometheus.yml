global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.rules.yml"

scrape_configs:
  - job_name: "sovereign-chain"
    static_configs:
      - targets: ["chain-node:26660"] # Tendermint/CometBFT Prometheus port

  - job_name: "backend-api"
    static_configs:
      - targets: ["backend-api:9090"]

  - job_name: "backend-ingestion"
    static_configs:
      - targets: ["backend-ingestion:9091"]

  - job_name: "nats-metrics"
    static_configs:
      - targets: ["nats-0:7777", "nats-1:7777", "nats-2:7777"]

  - job_name: "cosmos-validator"
    static_configs:
      - targets: ["localhost:26660"]

  - job_name: "oracle-aggregator"
    static_configs:
      - targets: ["localhost:9200"]

  - job_name: "relayer"
    static_configs:
      - targets: ["localhost:9300"]

  - job_name: "blockscout"
    static_configs:
      - targets: ["blockscout:4000"]
    metrics_path: "/metrics"

  - job_name: "faucet"
    static_configs:
      - targets: ["faucet-service:8000"]

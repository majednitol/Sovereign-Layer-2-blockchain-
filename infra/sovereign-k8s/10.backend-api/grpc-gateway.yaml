apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-gateway
  namespace: sovereign-chain
  labels:
    app: grpc-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grpc-gateway
  template:
    metadata:
      labels:
        app: grpc-gateway
    spec:
      containers:
        - name: gateway
          image: sovereign-l1/grpc-gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GRPC_BACKEND_URL
              value: "backend-api.sovereign-chain.svc.cluster.local:9090"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: grpc-gateway-service
  namespace: sovereign-chain
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: grpc-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grpc-gateway-hpa
  namespace: sovereign-chain
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grpc-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

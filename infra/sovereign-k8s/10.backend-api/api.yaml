apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: sovereign-chain
  labels:
    app: backend-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: api
          image: sovereign-l1/backend:latest
          command: ["/app/api"]
          ports:
            - containerPort: 9090
              name: grpc
            - containerPort: 8081
              name: http
          env:
            - name: READ_DB_URL
              value: "postgres://api_reader:sovereign_read_pwd@pgbouncer-read:6432/sovereign_read"
            - name: NATS_URL
              value: "nats://nats:4222"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: sovereign-chain
spec:
  ports:
    - port: 9090
      targetPort: 9090
      name: grpc
    - port: 8081
      targetPort: 8081
      name: http
  selector:
    app: backend-api

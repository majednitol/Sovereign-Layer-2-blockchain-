apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer-read
  labels:
    app: pgbouncer-read
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer-read
  template:
    metadata:
      labels:
        app: pgbouncer-read
    spec:
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:latest
          ports:
            - containerPort: 6432
              name: pgbouncer
          env:
            - name: DB_HOST
              value: "db-read"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "api_reader"
            - name: DB_PASSWORD
              value: "sovereign_read_pwd"
            - name: DB_NAME
              value: "sovereign_read"
            - name: PORT
              value: "6432"
            - name: POOL_MODE
              value: "transaction"
            - name: MAX_CLIENT_CONN
              value: "100"
            - name: DEFAULT_POOL_SIZE
              value: "20"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-read
spec:
  ports:
    - port: 6432
      targetPort: 6432
      name: pgbouncer
  selector:
    app: pgbouncer-read

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-write
  labels:
    app: db-write
spec:
  serviceName: db-write
  replicas: 1
  selector:
    matchLabels:
      app: db-write
  template:
    metadata:
      labels:
        app: db-write
    spec:
      containers:
        - name: db-write
          image: timescale/timescaledb-ha:pg16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: "sovereign_write"
            - name: POSTGRES_USER
              value: "ingestion_writer"
            - name: POSTGRES_PASSWORD
              value: "sovereign_write_pwd"
          command: ["postgres"]
          args:
            - "-c"
            - "wal_level=replica"
            - "-c"
            - "archive_mode=on"
            - "-c"
            - "archive_command=test ! -f /var/lib/postgresql/archive/%f && cp %p /var/lib/postgresql/archive/%f"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: db-write-data
              mountPath: /var/lib/postgresql/data
            - name: pg-write-archive
              mountPath: /var/lib/postgresql/archive
            - name: schemas-volume
              mountPath: /docker-entrypoint-initdb.d/000001_init_write.sql
              subPath: 000001_init_write.sql
            - name: schemas-volume
              mountPath: /docker-entrypoint-initdb.d/000002_timescale_write.sql
              subPath: 000002_timescale_write.sql
      volumes:
        - name: schemas-volume
          configMap:
            name: db-schemas-config
        - name: pg-write-archive
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: db-write-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: db-write
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: db-write

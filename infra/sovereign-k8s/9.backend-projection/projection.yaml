apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-projection
  namespace: sovereign-chain
  labels:
    app: backend-projection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-projection
  template:
    metadata:
      labels:
        app: backend-projection
    spec:
      containers:
        - name: projection
          image: sovereign-l1/backend:latest
          command: ["/app/projection"]
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: READ_DB_URL
              value: "postgres://api_reader:sovereign_read_pwd@db-read:5432/sovereign_read"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

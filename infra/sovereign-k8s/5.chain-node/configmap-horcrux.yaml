        { id = 3, address = "horcrux-signer-2.horcrux-service.sovereign-chain.svc:2222" }
    ]
    [chain]
    chain-id = "sovereign-testnet-1"
    key-file = "/secrets/share-1.key"
    state-file = "/data/state.json"
    double-sign-protection = true
    timeout-ms = 1000

  horcrux-1.toml: |
    threshold = 2
    [cosigner]
    node-id = 2
    listen-addr = "0.0.0.0:2222"
    peers = [
        { id = 1, address = "horcrux-signer-0.horcrux-service.sovereign-chain.svc:2222" },
        { id = 2, address = "horcrux-signer-1.horcrux-service.sovereign-chain.svc:2222" },
        { id = 3, address = "horcrux-signer-2.horcrux-service.sovereign-chain.svc:2222" }
    ]
    [chain]
    chain-id = "sovereign-testnet-1"
    key-file = "/secrets/share-2.key"
    state-file = "/data/state.json"
    double-sign-protection = true
    timeout-ms = 1000

  horcrux-2.toml: |
    threshold = 2
    [cosigner]
    node-id = 3
    listen-addr = "0.0.0.0:2222"
    peers = [
        { id = 1, address = "horcrux-signer-0.horcrux-service.sovereign-chain.svc:2222" },
        { id = 2, address = "horcrux-signer-1.horcrux-service.sovereign-chain.svc:2222" },
        { id = 3, address = "horcrux-signer-2.horcrux-service.sovereign-chain.svc:2222" }
    ]
    [chain]
    chain-id = "sovereign-testnet-1"
    key-file = "/secrets/share-3.key"
    state-file = "/data/state.json"
    double-sign-protection = true
    timeout-ms = 1000

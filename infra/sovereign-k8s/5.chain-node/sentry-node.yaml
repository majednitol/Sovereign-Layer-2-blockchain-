apiVersion: apps/v1
kind: Deployment
metadata:
  name: sovereign-sentry
  namespace: sovereign-chain
  labels:
    role: sentry
spec:
  replicas: 2
  selector:
    matchLabels:
      role: sentry
  template:
    metadata:
      labels:
        role: sentry
    spec:
      containers:
        - name: sentry-node
          image: sovereign-l1/chain-node:latest
          command:
            - "chaind"
            - "start"
            - "--p2p.laddr=tcp://0.0.0.0:26656"
            - "--p2p.pex=true"
            - "--p2p.private-peer-ids=validator-peer-id"
            - "--p2p.unconditional-peer-ids=validator-peer-id"
            - "--p2p.persistent-peers=validator-peer-id@validator-ip:26656"
          ports:
            - containerPort: 26656
              name: p2p
            - containerPort: 26657
              name: rpc
          resources:
            limits:
              cpu: "2"
              memory: 4Gi
            requests:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: genesis-volume
              mountPath: /root/genesis.json
              subPath: genesis.json
      volumes:
        - name: genesis-volume
          configMap:
            name: genesis-config
---
apiVersion: v1
kind: Service
metadata:
  name: sentry-service
  namespace: sovereign-chain
spec:
  selector:
    role: sentry
  ports:
    - protocol: TCP
      port: 26656
      targetPort: 26656
      name: p2p
    - protocol: TCP
      port: 26657
      targetPort: 26657
      name: rpc

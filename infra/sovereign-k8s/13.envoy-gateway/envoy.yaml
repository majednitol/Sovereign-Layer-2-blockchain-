apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-gateway
  namespace: sovereign-chain
  labels:
    app: envoy-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: envoy-gateway
  template:
    metadata:
      labels:
        app: envoy-gateway
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.28.0
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: envoy-config-volume
              mountPath: /etc/envoy
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: envoy-config-volume
          configMap:
            name: envoy-config
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-gateway
  namespace: sovereign-chain
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: envoy-gateway

apiVersion: v1
kind: Pod
metadata:
  name: storage-test-pod
  labels:
    app: storage-test
spec:
  containers:
    - name: test-container
      image: nginx
      resources:
        requests:
          memory: "64Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"
      ports:
        - containerPort: 80
      volumeMounts:
        - mountPath: /usr/share/nginx/html/
          name: storage-volume
  volumes:
    - name: storage-volume
      persistentVolumeClaim:
        claimName: sovereign-pvc

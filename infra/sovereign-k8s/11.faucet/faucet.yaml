apiVersion: apps/v1
kind: Deployment
metadata:
  name: faucet-service
  namespace: sovereign-chain
  labels:
    app: faucet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faucet
  template:
    metadata:
      labels:
        app: faucet
    spec:
      containers:
        - name: faucet
          image: sovereign-l1/backend:latest
          command: ["/app/faucet"]
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: NODE_URL
              value: "http://chain-node:26657"
            - name: FAUCET_KEY
              value: "faucet"
            - name: DENOM
              value: "usov"
            - name: FAUCET_AMOUNT
              value: "10000000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: faucet-service
  namespace: sovereign-chain
spec:
  selector:
    app: faucet
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      name: http

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-ingestion
  namespace: sovereign-chain
  labels:
    app: backend-ingestion
spec:
  replicas: 1 # Ingestion is a singleton worker
  selector:
    matchLabels:
      app: backend-ingestion
  template:
    metadata:
      labels:
        app: backend-ingestion
    spec:
      containers:
        - name: ingestion
          image: sovereign-l1/backend:latest
          command: ["/app/ingestion"]
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: WRITE_DB_URL
              value: "postgres://ingestion_writer:sovereign_write_pwd@db-write:5432/sovereign_write"
            - name: COMETBFT_RPC_URL
              value: "http://chain-node:26657"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: relayer
  labels:
    app: relayer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: relayer
  template:
    metadata:
      labels:
        app: relayer
    spec:
      containers:
        - name: relayer
          image: sovereign-l1/relayer:latest
          ports:
            - containerPort: 9300
              name: metrics
          env:
            - name: RELAYER_DB_URL
              value: "postgres://relayer_user:sovereign_relayer_pwd@db-relayer:5432/sovereign_relayer"
            - name: NATS_URL
              value: "nats://nats:4222"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: relayer
spec:
  ports:
    - port: 9300
      targetPort: 9300
      name: metrics
  selector:
    app: relayer
